server:
  port: 8080

spring:
  application:
    name: issueflow-test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT config mirrored for tests
jwt:
  secret: "IssueFlowTDP2026SuperSecretKeyForJWTSigningMustBe256BitsLong!!"
  expiration-ms: 86400000

# Disable the escalation scheduler in tests
scheduling:
  enabled: false
