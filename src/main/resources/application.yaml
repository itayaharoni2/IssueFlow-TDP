server:
  port: 8080

spring:
  application:
    name: issueflow
  datasource:
    url: jdbc:postgresql://localhost:5432/issueflow
    username: issueflow
    password: issueflow
    driver-class-name: org.postgresql.Driver
  jpa:
    database: POSTGRESQL
    show-sql: true
    open-in-view: false
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        "[format_sql]": true
  sql:
    init:
      platform: postgres
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    serialization:
      "[write-dates-as-timestamps]": false
    deserialization:
      "[fail-on-unknown-properties]": false

# JWT configuration (used in Phase 2)
jwt:
  secret: "IssueFlowTDP2026SuperSecretKeyForJWTSigningMustBe256BitsLong!!"
  expiration-ms: 86400000  # 24 hours
